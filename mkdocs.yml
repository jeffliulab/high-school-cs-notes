site_name: 高中计算机笔记
site_author: Jeff Liu
site_url: https://jeffliulab.github.io/high-school-cs-notes/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.top
    - navigation.path
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: zh
          default: true
          name: 中文
          build: true
        - locale: en
          name: English
          build: true
          site_name: "High School CS Notes"
          nav_translations:
            首页: Home
            考纲总览: Overview
            # === AP CSA ===
            第一单元 使用对象与方法: "Unit 1: Using Objects & Methods"
            第二单元 选择与迭代: "Unit 2: Selection & Iteration"
            第三单元 类的创建: "Unit 3: Class Creation"
            第四单元 数据集合: "Unit 4: Data Collections"
            单元总览: Unit Overview
            # === USACO 分类 ===
            入门: Getting Started
            完全搜索: Complete Search
            排序与集合: Sorting & Sets
            进阶专题: Additional Topics
            前缀和: Prefix Sums
            排序与查找: Sorting & Searching
            图论: Graphs
            其他专题: Other Topics
            数学: Math
            动态规划: Dynamic Programming
            数据结构: Data Structures
            树: Trees
            区间查询: Range Queries
            几何: Geometry
            杂项: Miscellaneous

nav:
